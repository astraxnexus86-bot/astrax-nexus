    content="Get in touch with AstraX Nexus to discuss new websites, apps, branding systems, or AI-powered business solutions." />

</head>

<body>
  <div id="site-nav"></div>
  <div id="site-breadcrumbs"></div>

  <main class="container-x" style="padding: 3.5rem 0 5rem">
    <div class="section-heading center">
      <div class="eyebrow">Contact</div>
      <h1>Let's build something great</h1>
      <p>Reach out — we'll respond within 24 hours.</p>
    </div>

    <div class="contact-grid">
      <!-- Info -->
      <div style="display:flex; flex-direction:column; gap:1rem">
        <div class="glass info-card">
          <div class="icon-badge">☎</div>
          <div>
            <p class="lbl">Phone</p>
            <p class="val"><a href="tel:+27677251568">067 725 1568</a></p>
          </div>
        </div>
        <div class="glass info-card">
          <div class="icon-badge">✉</div>
          <div>
            <p class="lbl">Email</p>
            <p class="val"><a href="mailto:astraxnexus86@gmail.com">astraxnexus86@gmail.com</a></p>
          </div>
        </div>
        <div class="glass info-card">
          <div class="icon-badge">◈</div>
          <div>
            <p class="lbl">Location</p>
            <p class="val">Limpopo, South Africa</p>
            <p class="text-muted" style="font-size:0.75rem; margin-top:0.25rem">Founder: Owen Gwaka</p>
          </div>
        </div>

        <div style="display:flex; gap:0.75rem; flex-wrap:wrap; margin-top:0.5rem">
          <a class="btn btn-gold" href="https://wa.me/27677251568" target="_blank" rel="noreferrer">💬 WhatsApp</a>
          <a class="btn btn-ghost-gold" href="mailto:astraxnexus86@gmail.com">✉ Email us</a>
        </div>

        <div class="glass map-card">
          <div>
            <div style="color:var(--gold); font-size:1.5rem">◈</div>
            <p style="margin-top:0.5rem">Google Maps placeholder</p>
            <p style="font-size:0.75rem; margin-top:0.25rem">Limpopo, South Africa</p>
          </div>
        </div>
      </div>

      <!-- Form -->
      <form class="glass-gold form-card" id="contact-form">
        <div class="form-row two">
          <div class="field"><label>Name <span class="req">*</span></label><input name="name" type="text" required />
          </div>
          <div class="field"><label>Email <span class="req">*</span></label><input name="email" type="email" required />
          </div>
        </div>
        <div class="form-row two">
          <div class="field"><label>Phone</label><input name="phone" type="tel" /></div>
          <div class="field"><label>Company (optional)</label><input name="company" type="text" /></div>
        </div>
        <div class="field" style="margin-bottom:1.25rem">
          <label>How can we help?</label>
          <textarea name="message" rows="5" required placeholder="Tell us about your project…"></textarea>
        </div>
        <button class="btn btn-gold" type="submit">Send message →</button>
      </form>
    </div>
  </main>

  <div id="site-footer"></div>
  <div id="site-chat"></div>
  <script src="assets/js/chatbot.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
